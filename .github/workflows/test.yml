name: test
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-tauri:
    strategy:
      fail-fast: false
      matrix:
        platform: 
          - macos-latest
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - windows-11-arm
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
      - name: setup node
        uses: actions/setup-node@v7
        with:
          node-version: 20
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: install Rust target for universal-apple-darwin
        if: startsWith(matrix.platform, 'macos')
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - name: install dependencies (ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xvfb
      - name: install app dependencies
        run: npm ci
      - name: verify feature-state matrix
        run: npm run test:matrix
      - name: run frontend unit and component tests
        run: npm run test:unit
      - name: build frontend asset for Rust tests
        run: npm run build
      - name: run Rust tests
        run: npm run test:rust
      - name: install Chromium for visual component tests
        if: matrix.platform == 'ubuntu-latest'
        run: npx playwright install --with-deps chromium
      - name: run visual component tests
        if: matrix.platform == 'ubuntu-latest'
        run: npm run test:browser
      - name: build Tauri E2E application
        if: matrix.platform == 'ubuntu-latest'
        run: npm run test:e2e:build
      - name: run Tauri E2E tests
        if: matrix.platform == 'ubuntu-latest'
        run: xvfb-run -a npm run test:e2e
      - uses: tauri-apps/tauri-action@v0
        with:
          tauriScript: 'npm run tauri'
          args: "--no-bundle ${{ matrix.args }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
